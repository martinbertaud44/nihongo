<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7ecfef">
<title>🌸 にほんご — Leçons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#7ecfef;--sky-d:#3aa0cc;--sky-l:#c2e9f7;
  --mint:#a8eac8;--mint-d:#4db888;
  --pink:#ffb3d1;--pink-d:#ff6fa8;
  --lav:#d4c6f7;--lav-d:#9b7fe8;
  --gold:#ffe066;
  --glass:rgba(255,255,255,.55);--gb:rgba(255,255,255,.8);
  --sh:0 8px 32px rgba(62,160,210,.18);--shd:0 16px 48px rgba(62,160,210,.28);
  --txt:#2a4a6b;--txt-l:#5a8ab0;--ok:#4db888;--err:#ff6fa8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;min-height:100vh;
  background:linear-gradient(135deg,#c2e9f7 0%,#a8f0e0 30%,#d4c6f7 65%,#ffcce5 100%);
  background-attachment:fixed;color:var(--txt);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(126,207,239,.3) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(168,234,200,.25) 0%,transparent 50%);
  z-index:-1;pointer-events:none}

/* HEADER */
header{padding:14px 16px;text-align:center;position:sticky;top:0;z-index:50;
  background:rgba(194,233,247,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.6);box-shadow:0 4px 20px rgba(62,160,210,.12);
  display:flex;align-items:center;gap:10px}
.back-btn{padding:8px 16px;border:1.5px solid var(--gb);border-radius:50px;
  background:var(--glass);font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;
  cursor:pointer;backdrop-filter:blur(10px);color:var(--txt);white-space:nowrap;
  transition:all .2s;flex-shrink:0}
.back-btn:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.header-title{font-size:1.1rem;font-weight:900;color:var(--sky-d);flex:1;text-align:center}
.xp-mini{font-size:.78rem;font-weight:800;color:var(--mint-d);white-space:nowrap;flex-shrink:0}

/* MAIN */
main{max-width:720px;margin:0 auto;padding:16px 14px 60px}

/* CARD */
.card{background:var(--glass);border:1.5px solid var(--gb);border-radius:22px;
  padding:18px;backdrop-filter:blur(16px);box-shadow:var(--sh);margin-bottom:14px}
.ctitle{font-size:1.1rem;font-weight:900;color:var(--sky-d);margin-bottom:12px;display:flex;align-items:center;gap:7px}

/* LESSON LIST */
.lesson-list{display:flex;flex-direction:column;gap:8px}
.li{background:var(--glass);border:1.5px solid var(--gb);border-radius:16px;
  padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;
  backdrop-filter:blur(12px);transition:all .2s cubic-bezier(.4,2,.6,1)}
.li:hover{transform:translateX(4px);box-shadow:var(--sh)}
.li.done{border-color:rgba(77,184,136,.5);background:linear-gradient(135deg,rgba(77,184,136,.15),rgba(126,207,239,.1))}
.li.locked{opacity:.45;cursor:not-allowed;filter:grayscale(.4)}
.li-ic{font-size:1.7rem;flex-shrink:0;width:40px;text-align:center}
.li-info h3{font-size:.92rem;font-weight:900}
.li-info p{font-size:.73rem;color:var(--txt-l);font-weight:600;margin-top:2px}
.li-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.li-badge{font-size:.67rem;font-weight:900;padding:2px 9px;border-radius:8px;white-space:nowrap}
.lb-done{background:rgba(77,184,136,.25);color:#2e7d52}
.lb-new{background:rgba(126,207,239,.3);color:var(--sky-d)}
.lb-lock{background:rgba(0,0,0,.07);color:var(--txt-l)}
.li-prog{font-size:.65rem;color:var(--txt-l);font-weight:700}
.prog-bar{width:60px;height:4px;background:rgba(0,0,0,.1);border-radius:4px;overflow:hidden;margin-top:2px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--sky-d),var(--mint-d));border-radius:4px;transition:width .4s}

/* CHAPTER HEADERS */
.chapter-head{padding:8px 14px;font-size:.8rem;font-weight:900;color:var(--sky-d);
  background:linear-gradient(135deg,rgba(126,207,239,.2),rgba(168,234,200,.15));
  border-radius:12px;margin:8px 0 4px;border-left:3px solid var(--sky-d)}

/* SCREENS */
.sc{display:none;animation:fi .3s ease}
.sc.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* PILLS */
.pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:5px 14px;border-radius:20px;border:1.5px solid var(--gb);background:var(--glass);
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;cursor:pointer;color:var(--txt);
  transition:all .18s;backdrop-filter:blur(8px)}
.pill.on{background:linear-gradient(135deg,var(--sky-d),var(--mint-d));color:#fff;border-color:transparent}

/* LESSON CONTENT */
.intro-banner{border-radius:20px;padding:20px;text-align:center;margin-bottom:14px;
  background:linear-gradient(135deg,rgba(126,207,239,.35),rgba(168,234,200,.3));
  border:1.5px solid rgba(126,207,239,.4)}
.intro-icon{font-size:3rem;margin-bottom:8px;display:block}
.intro-title{font-size:1.3rem;font-weight:900;color:var(--sky-d)}
.intro-sub{font-size:.85rem;color:var(--txt-l);font-weight:600;margin-top:4px}
.intro-tags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.tag{font-size:.72rem;font-weight:900;padding:3px 10px;border-radius:10px;background:var(--glass);border:1px solid var(--gb)}

/* STEP NAVIGATOR */
.step-nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.snav{padding:7px 14px;border-radius:50px;border:1.5px solid var(--gb);background:var(--glass);
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;cursor:pointer;color:var(--txt);
  backdrop-filter:blur(8px);transition:all .18s}
.snav.on{background:linear-gradient(135deg,var(--sky-d),var(--mint-d));color:#fff;border-color:transparent}
.snav.done-step{border-color:rgba(77,184,136,.5);color:var(--ok)}

/* KANA TABLE in lesson */
.kana-lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;margin:12px 0}
.klc{background:var(--glass);border:1.5px solid var(--gb);border-radius:14px;
  padding:12px 8px;text-align:center;backdrop-filter:blur(10px);
  transition:all .2s cubic-bezier(.4,2,.6,1);cursor:pointer}
.klc:hover{transform:translateY(-3px) scale(1.06);box-shadow:var(--sh)}
.klc.lrn{background:linear-gradient(135deg,rgba(77,184,136,.3),rgba(126,207,239,.2));border-color:rgba(77,184,136,.5)}
.klc-char{font-family:'Noto Sans JP',sans-serif;font-size:1.8rem;display:block;color:var(--txt)}
.klc-rom{font-size:.7rem;color:var(--txt-l);font-weight:700;margin-top:2px}
.klc-ex{font-size:.62rem;color:var(--sky-d);font-weight:600;margin-top:1px}

/* MNEMONIC */
.mnemo{background:linear-gradient(135deg,rgba(255,224,102,.25),rgba(255,179,209,.2));
  border:1.5px solid rgba(255,200,80,.4);border-radius:14px;padding:12px 16px;margin:8px 0}
.mnemo-title{font-size:.78rem;font-weight:900;color:#8a6200;margin-bottom:4px}
.mnemo-text{font-size:.85rem;color:var(--txt);font-weight:600;line-height:1.5}

/* GRAMMAR CARD */
.gram-card{background:linear-gradient(135deg,rgba(212,198,247,.3),rgba(126,207,239,.2));
  border:1.5px solid rgba(155,127,232,.3);border-radius:16px;padding:14px;margin:10px 0}
.gc-pattern{font-family:'Noto Sans JP',sans-serif;font-size:1rem;font-weight:700;color:var(--lav-d);margin-bottom:8px}
.gc-ex{background:rgba(255,255,255,.4);border-radius:10px;padding:10px 12px;margin:6px 0}
.gc-jp{font-family:'Noto Sans JP',sans-serif;font-size:.95rem;font-weight:700;color:var(--txt)}
.gc-rom{font-size:.75rem;color:var(--sky-d);font-weight:700;margin-top:2px}
.gc-fr{font-size:.8rem;color:var(--txt-l);font-weight:600}

/* VOCAB TABLE */
.vtable{width:100%;border-collapse:collapse}
.vtable th{background:linear-gradient(135deg,rgba(126,207,239,.3),rgba(168,234,200,.25));
  padding:8px 10px;font-weight:900;color:var(--sky-d);text-align:left;font-size:.82rem}
.vtable td{padding:8px 10px;border-bottom:1px solid rgba(126,207,239,.12);font-size:.85rem;font-weight:600}
.vtable td:first-child{font-family:'Noto Sans JP',sans-serif;font-size:1rem}
.vtable tr:hover td{background:rgba(255,255,255,.3)}

/* ===== WRITING PRACTICE ===== */
.write-area{text-align:center}
.write-target{font-family:'Noto Sans JP',sans-serif;font-size:5rem;color:var(--txt);
  display:block;margin:8px 0;filter:drop-shadow(0 4px 12px rgba(62,160,210,.2))}
.write-hint{font-size:.82rem;color:var(--txt-l);font-weight:700;margin-bottom:12px}
.canvas-wrap{position:relative;display:inline-block;margin:0 auto}
canvas#writeCanvas{
  background:rgba(255,255,255,.7);border:2px solid var(--gb);border-radius:16px;
  touch-action:none;cursor:crosshair;box-shadow:var(--sh);display:block}
.canvas-grid{position:absolute;inset:0;pointer-events:none;border-radius:14px;overflow:hidden}
.write-controls{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.wbtn{padding:10px 20px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;
  font-weight:900;font-size:.85rem;cursor:pointer;transition:all .18s cubic-bezier(.4,2,.6,1);box-shadow:var(--sh)}
.wbtn:hover{transform:translateY(-2px)}
.wbtn.clear{background:var(--glass);border:1.5px solid var(--gb);color:var(--txt);backdrop-filter:blur(8px)}
.wbtn.check{background:linear-gradient(135deg,var(--sky-d),var(--mint-d));color:#fff}
.wbtn.next{background:linear-gradient(135deg,var(--mint-d),#2ecc71);color:#fff}
.wbtn.show{background:linear-gradient(135deg,var(--lav-d),var(--sky-d));color:#fff}
.write-feedback{margin-top:10px;font-size:.9rem;font-weight:900;min-height:28px;text-align:center}
.stroke-order{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.stroke-step{background:var(--glass);border:1.5px solid var(--gb);border-radius:12px;
  padding:6px;text-align:center;backdrop-filter:blur(8px);min-width:50px}
.stroke-num{font-size:.65rem;font-weight:900;color:var(--sky-d);margin-bottom:2px}
.stroke-char{font-family:'Noto Sans JP',sans-serif;font-size:1.3rem;color:var(--txt)}
.write-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.write-counter{font-size:.85rem;font-weight:800;color:var(--txt-l)}
.write-score{display:flex;gap:8px}
.ws{padding:4px 12px;border-radius:10px;background:var(--glass);border:1.5px solid var(--gb);font-weight:900;font-size:.82rem}

/* QUIZ in lesson */
.q-card{background:var(--glass);border:1.5px solid var(--gb);border-radius:18px;
  padding:18px;backdrop-filter:blur(12px);text-align:center}
.q-char{font-family:'Noto Sans JP',sans-serif;font-size:4rem;color:var(--txt);
  display:block;margin-bottom:8px;filter:drop-shadow(0 4px 10px rgba(62,160,210,.2))}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:360px;margin:12px auto}
.q-opt{padding:13px;border-radius:14px;border:1.5px solid var(--gb);background:var(--glass);
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;
  backdrop-filter:blur(10px);transition:all .18s;color:var(--txt)}
.q-opt:hover:not(:disabled){transform:translateY(-2px);box-shadow:var(--sh)}
.q-opt.ok{background:linear-gradient(135deg,rgba(77,184,136,.6),rgba(46,204,113,.5));border-color:var(--ok);color:#fff}
.q-opt.ko{background:linear-gradient(135deg,rgba(255,111,168,.6),rgba(231,76,60,.4));border-color:var(--err);color:#fff}
.q-opt:disabled{cursor:not-allowed}
.q-fb{font-size:.95rem;font-weight:900;min-height:26px;margin:10px 0;text-align:center}
.q-next{display:block;margin:8px auto 0;padding:10px 24px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--sky-d),var(--mint-d));color:#fff;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;cursor:pointer;box-shadow:var(--sh);transition:all .18s}
.q-next:hover{transform:translateY(-2px)}
.q-score{display:flex;gap:12px;justify-content:center;margin-bottom:12px}
.q-sc{padding:6px 16px;border-radius:12px;background:var(--glass);border:1.5px solid var(--gb);font-weight:900;font-size:.82rem}

/* COMPLETE BANNER */
.complete-banner{background:linear-gradient(135deg,rgba(77,184,136,.3),rgba(255,224,102,.25));
  border:1.5px solid rgba(77,184,136,.4);border-radius:20px;padding:24px;text-align:center;margin-top:14px}
.cb-icon{font-size:3rem;display:block;margin-bottom:8px}
.cb-title{font-size:1.2rem;font-weight:900;color:#2e7d52}
.cb-sub{font-size:.85rem;color:var(--txt-l);font-weight:600;margin-top:4px}

/* ACTION BTNS */
.action-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px}
.abtn{padding:10px 22px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;
  font-weight:900;font-size:.88rem;cursor:pointer;transition:all .18s cubic-bezier(.4,2,.6,1);box-shadow:var(--sh)}
.abtn:hover{transform:translateY(-2px)}
.abtn.primary{background:linear-gradient(135deg,var(--sky-d),var(--mint-d));color:#fff}
.abtn.sec{background:var(--glass);border:1.5px solid var(--gb);color:var(--txt);backdrop-filter:blur(8px)}
.abtn.gold{background:linear-gradient(135deg,var(--gold),#f0b800);color:#7a5800}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,rgba(77,184,136,.95),rgba(46,204,113,.9));color:#fff;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;padding:9px 20px;
  border-radius:50px;box-shadow:var(--shd);opacity:0;transition:all .3s;z-index:300;
  pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CONFETTI */
.cf{position:fixed;pointer-events:none;z-index:400;animation:cfall 1.1s ease forwards}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

@media(max-width:480px){
  .kana-lesson-grid{grid-template-columns:repeat(auto-fill,minmax(68px,1fr))}
  .q-opts{grid-template-columns:1fr 1fr}
  canvas#writeCanvas{width:260px!important;height:260px!important}
}
</style>
</head>

</main>

<div class="toast" id="toast"></div>

function showList(){
  document.getElementById('sc-list').classList.add('on');
  document.getElementById('sc-lesson').classList.remove('on');
  document.getElementById('headerTitle').textContent='📚 Leçons';
  renderList();
}
function showLesson(lesson){
  curLesson=lesson; curStep=0;
  document.getElementById('sc-list').classList.remove('on');
  document.getElementById('sc-lesson').classList.add('on');
  document.getElementById('headerTitle').textContent=lesson.icon+' '+lesson.title;
  renderLessonDetail();
}
function goBack(){
  if(document.getElementById('sc-lesson').classList.contains('on')) showList();
  else if(window.opener) window.close();
  else window.history.back();
}

// ================================================================
// RENDER LIST
// ================================================================
function renderList(){
  let html='';
  // Count total lessons for progress
  let total=0; CHAPTERS.forEach(c=>total+=c.lessons.length);
  let done=doneL.length;
  html+=`<div class="card" style="text-align:center;margin-bottom:14px">
    <div style="font-size:1rem;font-weight:900;color:var(--sky-d)">Progression globale</div>
    <div style="font-size:2rem;font-weight:900;color:var(--mint-d);margin:4px 0">${done}/${total}</div>
    <div style="background:rgba(0,0,0,.08);border-radius:8px;height:8px;overflow:hidden;margin-top:6px">
      <div style="height:100%;background:linear-gradient(90deg,var(--sky-d),var(--mint-d));border-radius:8px;width:${Math.round(done/total*100)}%;transition:width .5s"></div>
    </div>
  </div>`;

  CHAPTERS.forEach((chap,ci)=>{
    html+=`<div class="chapter-head">${chap.title}</div><div class="lesson-list">`;
    chap.lessons.forEach((l,li)=>{
      const isDone=doneL.includes(l.id);
      // Lock: only lock if more than 1 chapter ahead and prev lesson not done
      const prevLesson = li>0 ? chap.lessons[li-1] : (ci>0 ? CHAPTERS[ci-1].lessons[CHAPTERS[ci-1].lessons.length-1] : null);
      const locked = prevLesson && !doneL.includes(prevLesson.id) && li>0;
      html+=`<div class="li ${isDone?'done':''} ${locked?'locked':''}" onclick="${locked?`toast('Termine la leçon précédente !')`:(`openLesson('${l.id}')`)}">
        <span class="li-ic">${l.icon}</span>
        <div class="li-info"><h3>${l.title}</h3><p>${l.desc}</p></div>
        <div class="li-right">
          <span class="li-badge ${isDone?'lb-done':locked?'lb-lock':'lb-new'}">${isDone?'✓ Fait':locked?'🔒':l.badge}</span>
          ${l.data.length>0?`<div class="li-prog">${l.data.filter(x=>lrn[x.k]).length}/${l.data.length} appris</div>`:''}
        </div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('lessonListContainer').innerHTML=html;
}

function openLesson(id){
  let found=null;
  CHAPTERS.forEach(c=>c.lessons.forEach(l=>{if(l.id===id)found=l;}));
  if(found) showLesson(found);
}

// ================================================================
// RENDER LESSON DETAIL
// ================================================================
function renderLessonDetail(){
  const l=curLesson;
  const stepNames={intro:'📖 Intro',apprendre:'✏️ Apprendre',mnemo:'💡 Mnémo',ecrire:'✍️ Écrire',quiz:'🎯 Quiz'};
  let html=`<div class="step-nav">`;
  l.steps.forEach((s,i)=>{
    const isDoneStep = i < curStep;
    html+=`<button class="snav ${i===curStep?'on':''} ${isDoneStep?'done-step':''}" onclick="goStep(${i})">${stepNames[s]||s}</button>`;
  });
  html+='</div>';
  html+=renderStep(l.steps[curStep]);
  document.getElementById('lessonDetailContainer').innerHTML=html;
  // Init canvas if writing step
  if(l.steps[curStep]==='ecrire') initCanvas();
}

function goStep(i){
  curStep=i;
  renderLessonDetail();
  window.scrollTo(0,0);
}
function nextStep(){
  if(curStep<curLesson.steps.length-1){curStep++;renderLessonDetail();window.scrollTo(0,0);}
}

// ================================================================
// STEP RENDERERS
// ================================================================
function renderStep(step){
  const l=curLesson;
  switch(step){
    case 'intro': return renderIntro(l);
    case 'apprendre': return l.grammar ? renderGrammar(l) : l.vocab ? renderVocab(l) : renderApprendre(l);
    case 'mnemo': return renderMnemo(l);
    case 'ecrire': return renderWrite(l);
    case 'quiz': return renderQuiz(l);
    default: return '<p>?</p>';
  }
}

// INTRO
function renderIntro(l){
  const isDone=doneL.includes(l.id);
  return `<div class="intro-banner">
    <span class="intro-icon">${l.icon}</span>
    <div class="intro-title">${l.title}</div>
    <div class="intro-sub">${l.desc}</div>
    <div class="intro-tags">
      <span class="tag">🎯 ${l.steps.length} étapes</span>
      <span class="tag">${l.badge}</span>
      ${l.data.length>0?`<span class="tag">📝 ${l.data.length} caractères</span>`:''}
      ${isDone?'<span class="tag" style="background:rgba(77,184,136,.2);border-color:rgba(77,184,136,.4)">✅ Déjà terminé</span>':''}
    </div>
  </div>
  ${l.tips?`<div class="card"><div class="ctitle">💡 Conseils</div>${l.tips.map(t=>`<div style="padding:7px 0;border-bottom:1px solid rgba(126,207,239,.12);font-size:.88rem;font-weight:600">• ${t}</div>`).join('')}</div>`:''}
  <div class="action-btns">
    <button class="abtn primary" onclick="nextStep()">Commencer la leçon →</button>
  </div>`;
}

// APPRENDRE (kana)
function renderApprendre(l){
  const data=l.data;
  return `<div class="card">
    <div class="ctitle">✏️ Les caractères à apprendre</div>
    <div class="kana-lesson-grid">
      ${data.map(c=>`
        <div class="klc ${lrn[c.k]?'lrn':''}" onclick="markLearned('${c.k}');this.classList.add('lrn');toast('${c.k} appris ! +2 XP');addXP(2);">
          <span class="klc-char">${c.k}</span>
          <span class="klc-rom">${c.r}</span>
          <span class="klc-ex">${c.ex.split('=')[0]}</span>
        </div>`).join('')}
    </div>
    <div style="font-size:.78rem;color:var(--txt-l);font-weight:600;text-align:center;margin-top:8px">Clique sur chaque caractère pour le marquer comme appris !</div>
  </div>
  <div class="card">
    <div class="ctitle">📋 Tableau complet</div>
    <table class="vtable">
      <tr><th>Char.</th><th>Romaji</th><th>Exemple</th></tr>
      ${data.map(c=>`<tr><td>${c.k}</td><td>${c.r}</td><td>${c.ex}</td></tr>`).join('')}
    </table>
  </div>
  <div class="action-btns"><button class="abtn primary" onclick="nextStep()">Continuer →</button></div>`;
}

// MNÉMONIQUES
function renderMnemo(l){
  const data=l.data;
  return `<div class="card">
    <div class="ctitle">💡 Astuces mnémotechniques</div>
    ${data.map(c=>`
      <div class="mnemo">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:2rem">${c.k}</span>
          <span style="font-size:1rem;font-weight:900;color:var(--sky-d)">${c.r}</span>
        </div>
        <div class="mnemo-title">Astuce :</div>
        <div class="mnemo-text">${c.mn||'Répète-le 10 fois !'}</div>
      </div>`).join('')}
  </div>
  <div class="action-btns"><button class="abtn primary" onclick="nextStep()">Pratiquer l'écriture →</button></div>`;
}

// GRAMMAIRE
function renderGrammar(l){
  return `<div class="card">
    <div class="ctitle">📖 Points de grammaire</div>
    ${l.grammar.map(g=>`
      <div class="gram-card">
        <div class="gc-pattern">${g.pattern}</div>
        <div class="gc-ex">
          <div class="gc-jp">${g.jp}</div>
          <div class="gc-rom">${g.rom}</div>
          <div class="gc-fr">${g.fr}</div>
        </div>
        <div style="font-size:.78rem;color:var(--txt-l);font-weight:600;margin-top:6px">💡 ${g.note}</div>
      </div>`).join('')}
  </div>
  ${l.tips?`<div class="card"><div class="ctitle">⚡ Points clés</div>${l.tips.map(t=>`<div style="padding:7px 0;border-bottom:1px solid rgba(126,207,239,.12);font-size:.88rem;font-weight:600">• ${t}</div>`).join('')}</div>`:''}
  <div class="action-btns"><button class="abtn primary" onclick="nextStep()">Quiz →</button></div>`;
}

// VOCAB
function renderVocab(l){
  return `<div class="card">
    <div class="ctitle">💬 Vocabulaire</div>
    <table class="vtable">
      <tr><th>Japonais</th><th>Romaji</th><th>Français</th></tr>
      ${l.vocab.map(v=>`<tr><td>${v.jp}</td><td>${v.r}</td><td>${v.fr}</td></tr>`).join('')}
    </table>
  </div>
  ${l.tips?`<div class="card"><div class="ctitle">💡 Astuces</div>${l.tips.map(t=>`<div style="padding:7px 0;border-bottom:1px solid rgba(126,207,239,.12);font-size:.88rem;font-weight:600">• ${t}</div>`).join('')}</div>`:''}
  <div class="action-btns"><button class="abtn primary" onclick="nextStep()">Quiz →</button></div>`;
}

// ================================================================
// WRITING PRACTICE
// ================================================================
let writeData = [], writeCur = null;

function renderWrite(l){
  writeData=[...l.data];
  writeIdx=0; writeOk=0; writeTotal=writeData.length;
  if(!writeData.length) return `<div class="card"><p>Pas d'exercice d'écriture pour cette leçon.</p></div>
    <div class="action-btns"><button class="abtn primary" onclick="nextStep()">Suivant →</button></div>`;
  return buildWriteUI();
}

function buildWriteUI(){
  if(writeIdx>=writeData.length){
    return `<div class="complete-banner">
      <span class="cb-icon">✍️</span>
      <div class="cb-title">Écriture terminée !</div>
      <div class="cb-sub">${writeOk}/${writeTotal} réussis</div>
    </div>
    <div class="action-btns"><button class="abtn primary" onclick="nextStep()">Quiz →</button></div>`;
  }
  writeCur=writeData[writeIdx];
  return `<div class="card write-area">
    <div class="write-nav">
      <span class="write-counter">✍️ ${writeIdx+1} / ${writeTotal}</span>
      <div class="write-score">
        <span class="ws" style="color:var(--ok)">✓ ${writeOk}</span>
        <span class="ws" style="color:var(--err)">✗ ${writeIdx-writeOk}</span>
      </div>
    </div>
    <div class="ctitle" style="justify-content:center">Écris ce caractère :</div>
    <span class="write-target">${writeCur.k}</span>
    <div class="write-hint">${writeCur.r} — ${writeCur.ex}</div>
    <div class="canvas-wrap">
      <canvas id="writeCanvas" width="280" height="280"></canvas>
    </div>
    <div class="write-feedback" id="wfb"></div>
    <div class="write-controls">
      <button class="wbtn clear" onclick="clearCanvas()">🗑️ Effacer</button>
      <button class="wbtn show" onclick="showModel()">👁️ Modèle</button>
      <button class="wbtn check" onclick="selfEval(true)">✓ J'ai réussi</button>
      <button class="wbtn next" onclick="selfEval(false)" style="background:linear-gradient(135deg,var(--err),#e74c3c)">✗ À revoir</button>
    </div>
  </div>`;
}

function initCanvas(){
  setTimeout(()=>{
    const canvas=document.getElementById('writeCanvas');
    if(!canvas)return;
    ctx=canvas.getContext('2d');
    ctx.strokeStyle='#2a4a6b';
    ctx.lineWidth=4;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    drawGrid(canvas,ctx);
    // Mouse
    canvas.addEventListener('mousedown',e=>{painting=true;[lastX,lastY]=getPos(e,canvas);});
    canvas.addEventListener('mousemove',e=>{if(!painting)return;draw(e,canvas);});
    canvas.addEventListener('mouseup',()=>painting=false);
    canvas.addEventListener('mouseleave',()=>painting=false);
    // Touch
    canvas.addEventListener('touchstart',e=>{e.preventDefault();painting=true;[lastX,lastY]=getPos(e.touches[0],canvas);},{passive:false});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!painting)return;draw(e.touches[0],canvas);},{passive:false});
    canvas.addEventListener('touchend',()=>painting=false);
  },100);
}

function drawGrid(canvas,ctx){
  ctx.save();
  ctx.strokeStyle='rgba(126,207,239,.3)';
  ctx.lineWidth=1;
  ctx.setLineDash([4,4]);
  // Cross
  ctx.beginPath();ctx.moveTo(140,10);ctx.lineTo(140,270);ctx.stroke();
  ctx.beginPath();ctx.moveTo(10,140);ctx.lineTo(270,140);ctx.stroke();
  // Outer border hint
  ctx.strokeStyle='rgba(126,207,239,.15)';
  ctx.strokeRect(10,10,260,260);
  ctx.restore();
  ctx.setLineDash([]);
}

function getPos(e,canvas){
  const r=canvas.getBoundingClientRect();
  const scaleX=canvas.width/r.width;
  const scaleY=canvas.height/r.height;
  return [(e.clientX-r.left)*scaleX,(e.clientY-r.top)*scaleY];
}

function draw(e,canvas){
  const [x,y]=getPos(e,canvas);
  ctx.beginPath();
  ctx.moveTo(lastX,lastY);
  ctx.lineTo(x,y);
  ctx.stroke();
  [lastX,lastY]=[x,y];
}

function clearCanvas(){
  if(!ctx)return;
  const canvas=document.getElementById('writeCanvas');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid(canvas,ctx);
  document.getElementById('wfb').textContent='';
}

function showModel(){
  if(!ctx)return;
  const canvas=document.getElementById('writeCanvas');
  ctx.save();
  ctx.font='200px "Noto Sans JP"';
  ctx.fillStyle='rgba(126,207,239,.3)';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(writeCur.k,140,150);
  ctx.restore();
  document.getElementById('wfb').innerHTML='<span style="color:var(--sky-d)">Modèle affiché en transparence — écris par-dessus !</span>';
}

function selfEval(ok){
  if(ok){writeOk++;markLearned(writeCur.k);addXP(8);confetti();}
  writeIdx++;
  const container=document.getElementById('lessonDetailContainer');
  // Rebuild just the write card, keep step nav
  const stepNav=container.querySelector('.step-nav');
  container.innerHTML=(stepNav?stepNav.outerHTML:'')+buildWriteUI();
  if(writeIdx<writeData.length) initCanvas();
}

// ================================================================
// QUIZ
// ================================================================
let lessonQuizDone=false;

function renderQuiz(l){
  qOk=0;qKo=0;lessonQuizDone=false;
  // Build pool
  if(l.grammar){
    qPool=l.grammar.map(g=>({q:g.jp,a:g.fr,opts:[g.fr,...l.grammar.filter(x=>x!==g).map(x=>x.fr).slice(0,3)],type:'gram'}));
  } else if(l.vocab){
    qPool=l.vocab.map(v=>({q:v.jp,a:v.fr,opts:[v.fr,...l.vocab.filter(x=>x!==v).map(x=>x.fr).slice(0,3)],type:'vocab'}));
  } else {
    qPool=l.data.map(c=>({q:c.k,a:c.r,opts:[c.r,...l.data.filter(x=>x!==c).map(x=>x.r).slice(0,3)],type:'kana'}));
  }
  shuf(qPool);
  return buildQuizUI();
}

function buildQuizUI(){
  if(lessonQuizDone||qPool.length===0){
    const isDone=doneL.includes(curLesson.id);
    return `<div class="complete-banner">
      <span class="cb-icon">${qOk>=Math.ceil(qPool.length*.7)?'🎉':'📖'}</span>
      <div class="cb-title">${qOk>=Math.ceil(qPool.length*.7)?'Excellent ! Leçon maîtrisée !':'Bonne tentative !'}</div>
      <div class="cb-sub">Score : ${qOk}/${qPool.length} correct${qOk>1?'s':''}</div>
      ${!isDone&&qOk>=Math.ceil(qPool.length*.7)?`<div style="font-size:.85rem;font-weight:600;margin-top:8px;color:var(--mint-d)">+100 XP pour avoir terminé la leçon !</div>`:''}
    </div>
    <div class="action-btns">
      ${!isDone&&qOk>=Math.ceil(qPool.length*.7)?`<button class="abtn gold" onclick="completeLesson()">🏆 Valider la leçon</button>`:''}
      <button class="abtn primary" onclick="retryQuiz()">🔄 Réessayer</button>
      <button class="abtn sec" onclick="showList()">← Retour aux leçons</button>
    </div>`;
  }
  qCur=qPool.shift();
  const opts=shuf([...qCur.opts]).slice(0,4);
  if(!opts.includes(qCur.a))opts[0]=qCur.a;
  shuf(opts);
  return `<div class="q-card">
    <div class="q-score">
      <span class="q-sc" style="color:var(--ok)">✓ ${qOk}</span>
      <span class="q-sc" style="color:var(--err)">✗ ${qKo}</span>
      <span class="q-sc" style="color:var(--txt-l)">${qPool.length} restantes</span>
    </div>
    <span class="q-char">${qCur.q}</span>
    <div class="q-opts">
      ${opts.map(o=>`<button class="q-opt" onclick="checkQ('${o.replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}
    </div>
    <div class="q-fb" id="qfb"></div>
    <button class="q-next" id="qnext" onclick="nextQ()" style="display:none">Suivant →</button>
  </div>`;
}

function checkQ(ans,btn){
  document.querySelectorAll('.q-opt').forEach(b=>b.disabled=true);
  const ok=ans===qCur.a;
  btn.classList.add(ok?'ok':'ko');
  if(!ok) document.querySelectorAll('.q-opt').forEach(b=>{if(b.textContent===qCur.a)b.classList.add('ok');});
  const fb=document.getElementById('qfb');
  if(ok){fb.innerHTML='🎉 Correct ! +10 XP';fb.style.color='var(--ok)';qOk++;addXP(10);confetti();}
  else{fb.innerHTML=`✗ C'était : <b>${qCur.a}</b>`;fb.style.color='var(--err)';qKo++;}
  document.getElementById('qnext').style.display='block';
}

function nextQ(){
  const container=document.getElementById('lessonDetailContainer');
  const stepNav=container.querySelector('.step-nav');
  if(qPool.length===0) lessonQuizDone=true;
  container.innerHTML=(stepNav?stepNav.outerHTML:'')+buildQuizUI();
}

function retryQuiz(){
  const container=document.getElementById('lessonDetailContainer');
  const stepNav=container.querySelector('.step-nav');
  container.innerHTML=(stepNav?stepNav.outerHTML:'')+renderQuiz(curLesson);
}

function completeLesson(){
  if(!doneL.includes(curLesson.id)){
    doneL.push(curLesson.id);
    localStorage.setItem('nj_done',JSON.stringify(doneL));
    addXP(100);confetti();confetti();
  }
  setTimeout(showList,1200);
}

// ================================================================
// TOAST & CONFETTI
// ================================================================
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function confetti(){
  const cols=['#7ecfef','#a8eac8','#ffb3d1','#ffe066','#ff6fa8','#4db888','#d4c6f7'];
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='cf';
    el.style.cssText=`left:${Math.random()*100}vw;top:${Math.random()*40}vh;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*.4}s;animation-duration:${.9+Math.random()*.5}s`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1500);
  }
}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ================================================================
// INIT
// ================================================================
document.getElementById('xpDisp').textContent=xp;
showList();
</script>
</body>
